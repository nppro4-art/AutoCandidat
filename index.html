<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidatures — Noah Puget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 24px; }

  .tracker { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .tracker-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .tracker-num { font-size: 28px; font-weight: 700; }
  .progress { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width 0.4s; }
  .tracker-sub { font-size: 12px; color: #888; margin-top: 6px; }

  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }

  .type-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .type-btn { padding: 10px 6px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; text-align: center; color: #444; transition: all 0.15s; }
  .type-btn.active { border: 2px solid #2563eb; background: #eff6ff; color: #2563eb; }

  label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  input, textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus { border-color: #2563eb; }
  textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }

  .btn-primary { width: 100%; padding: 11px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-copy { padding: 6px 14px; background: #fff; color: #444; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .btn-copy:hover { border-color: #999; }
  .btn-mark { width: 100%; margin-top: 10px; padding: 9px; background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-danger { padding: 3px 8px; background: #fff; color: #dc2626; border: 1px solid #fca5a5; border-radius: 6px; font-size: 12px; cursor: pointer; }

  .error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
  .loading { color: #666; font-size: 13px; margin-top: 14px; display: none; align-items: center; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result { margin-top: 20px; display: none; }

  .result-block { margin-bottom: 16px; }
  .result-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .result-block-title { font-size: 14px; font-weight: 600; }
  .result-block-label { font-size: 11px; color: #888; margin-left: 6px; font-weight: 400; }

  .content-box { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; font-size: 13px; line-height: 1.75; white-space: pre-wrap; color: #222; max-height: 340px; overflow-y: auto; }
  .mail-box { background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 14px 16px; font-size: 13px; line-height: 1.75; white-space: pre-wrap; color: #1e3a5f; max-height: 200px; overflow-y: auto; }

  .divider { border: none; border-top: 1px solid #e0e0e0; margin: 16px 0; }

  .sent-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; margin-bottom: 6px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
  .badge-app { background: #eff6ff; color: #2563eb; }
  .badge-stage { background: #f0fdf4; color: #16a34a; }
  .badge-job { background: #fefce8; color: #ca8a04; }
  .section-title { font-size: 14px; font-weight: 600; margin: 16px 0 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Générateur de candidatures</h1>
  <p class="sub">Noah Puget — MP3D · Lycée Amédée Gordini, Seynod</p>

  <div class="tracker">
    <div class="tracker-row">
      <span style="font-size:13px;color:#666;">Candidatures envoyées</span>
      <span class="tracker-num" id="tracker-num">0 / 30</span>
    </div>
    <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="tracker-sub" id="tracker-sub">0 stages/apprentissages · 0 jobs d'été</div>
  </div>

  <div class="card">
    <div class="type-btns">
      <button class="type-btn active" id="t-app" onclick="setType('apprentissage')">🎓 Apprentissage</button>
      <button class="type-btn" id="t-stage" onclick="setType('stage')">🔧 Stage</button>
      <button class="type-btn" id="t-job" onclick="setType('job')">💼 Job d'été</button>
    </div>

    <div class="field-row">
      <div>
        <label>Entreprise *</label>
        <input id="company" type="text" placeholder="Ex: ARRK, Somfy, Décathlon..." />
      </div>
      <div>
        <label>Ville</label>
        <input id="city" type="text" placeholder="Ex: Annecy, Rumilly..." />
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Secteur d'activité</label>
        <input id="sector" type="text" placeholder="Ex: impression 3D, industrie..." />
      </div>
      <div>
        <label>Email du recruteur (optionnel)</label>
        <input id="recruiter-email" type="email" placeholder="rh@entreprise.fr" />
      </div>
    </div>
    <div class="field">
      <label>Infos sur l'entreprise (optionnel)</label>
      <textarea id="info" placeholder="Quelques infos trouvées sur leur site pour personnaliser..."></textarea>
    </div>

    <button class="btn-primary" id="gen-btn" onclick="generate()">⚡ Générer la lettre + le mail</button>
    <div class="error" id="err-box"></div>
    <div class="loading" id="load-box"><div class="spinner"></div> Génération en cours...</div>

    <div class="result" id="result-box">

      <!-- MAIL -->
      <div class="result-block">
        <div class="result-block-header">
          <span class="result-block-title">📧 Texte du mail <span class="result-block-label">— à coller dans le corps du mail</span></span>
          <button class="btn-copy" onclick="copyContent('mail-content', this)">Copier</button>
        </div>
        <div class="mail-box" id="mail-content"></div>
      </div>

      <hr class="divider">

      <!-- LETTRE -->
      <div class="result-block">
        <div class="result-block-header">
          <span class="result-block-title">📄 Lettre de motivation <span class="result-block-label">— à joindre en PDF</span></span>
          <button class="btn-copy" onclick="copyContent('letter-content', this)">Copier</button>
        </div>
        <div class="content-box" id="letter-content"></div>
      </div>

      <button class="btn-mark" onclick="markSent()">✅ Marquer comme envoyée</button>
    </div>
  </div>

  <div id="history-section" style="display:none;">
    <div class="section-title">Historique</div>
    <div id="sent-list"></div>
  </div>
</div>

<script>
let selectedType = 'apprentissage';
let sentItems = [];
try { sentItems = JSON.parse(localStorage.getItem('noah_cand') || '[]'); } catch(e) {}

const CV = `Noah Puget, 16 ans (bientôt 17), Vaulx 74150, np.pro4@gmail.com, +33 7 87 14 69 92, nationalité franco-suisse.
FORMATION: 1ère pro Modélisation et Prototypage 3D (MP3D) au lycée Amédée Gordini à Seynod (74). Logiciels: SolidWorks, Cura.
EXPÉRIENCES: CDI boulangerie depuis août 2025; SNU bénévolat maison de retraite; stage architecture 2 semaines; logistique Bulthaup Genève; confection pâtisseries.
POINTS FORTS: proactif, méticuleux, polyvalent, bon esprit d'équipe.`;

function setType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  const map = { apprentissage: 'app', stage: 'stage', job: 'job' };
  document.getElementById('t-' + map[t]).classList.add('active');
}

async function generate() {
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';

  const company = document.getElementById('company').value.trim();
  const city = document.getElementById('city').value.trim();
  const sector = document.getElementById('sector').value.trim();
  const info = document.getElementById('info').value.trim();
  const email = document.getElementById('recruiter-email').value.trim();

  if (!company) { showErr("Entre le nom de l'entreprise."); return; }

  const typeLabel = {
    apprentissage: "contrat d'apprentissage en terminale MP3D (septembre 2026 – juillet 2027)",
    stage: "stage de formation en terminale MP3D",
    job: "job d'été (emploi saisonnier)"
  }[selectedType];

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('load-box').style.display = 'flex';

  const prompt = `Tu dois générer deux choses pour une candidature de Noah Puget.

PROFIL:
${CV}

CANDIDATURE:
- Entreprise: ${company}
- Ville: ${city || 'non précisée'}
- Secteur: ${sector || 'non précisé'}
- Type: ${typeLabel}
${info ? '- Infos entreprise: ' + info : ''}

GÉNÈRE exactement ce JSON (rien d'autre, pas de markdown):
{
  "mail": "...",
  "lettre": "..."
}

RÈGLES POUR LE MAIL (champ "mail"):
- Court, 4-5 lignes max
- Objet non inclus (juste le corps)
- Commence par "Madame, Monsieur,"
- Présente Noah en 1 phrase, mentionne le type de candidature, dit qu'il joint CV + lettre
- Termine par une formule courte et "Noah Puget"
- Ne pas répéter ce qui est dans la lettre

RÈGLES POUR LA LETTRE (champ "lettre"):
- Lettre complète et professionnelle
- Commence par "Madame, Monsieur,"
- 3-4 paragraphes: formation/profil, motivation pour cette entreprise, compétences apportées, formule de politesse
- ${selectedType === 'job' ? 'Job été: valorise disponibilité, polyvalence, sérieux, expérience terrain' : 'Stage/apprentissage: insiste sur SolidWorks, Cura, modélisation 3D, MP3D'}
- Personnalise avec le nom exact de l'entreprise et son secteur
- Termine par "Veuillez agréer, Madame, Monsieur, l'expression de mes salutations distinguées.\\n\\nNoah PUGET"
- 200-220 mots`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error || 'Erreur serveur ' + res.status);
    }
    const data = await res.json();
    if (!data.mail || !data.lettre) throw new Error('Réponse incomplète.');

    document.getElementById('mail-content').textContent = data.mail;
    document.getElementById('letter-content').textContent = data.lettre;
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('result-box').dataset.company = company;
    document.getElementById('result-box').dataset.city = city;

  } catch(e) {
    showErr('Erreur : ' + e.message);
  }

  document.getElementById('load-box').style.display = 'none';
  document.getElementById('gen-btn').disabled = false;
}

function showErr(msg) {
  const b = document.getElementById('err-box');
  b.textContent = msg; b.style.display = 'block';
}

function copyContent(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copié !';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function markSent() {
  const rb = document.getElementById('result-box');
  sentItems.push({ company: rb.dataset.company, city: rb.dataset.city, type: selectedType, date: new Date().toLocaleDateString('fr-FR') });
  try { localStorage.setItem('noah_cand', JSON.stringify(sentItems)); } catch(e) {}
  updateTracker(); renderList();
}

function updateTracker() {
  const total = sentItems.length;
  const stages = sentItems.filter(i => i.type !== 'job').length;
  const jobs = sentItems.filter(i => i.type === 'job').length;
  document.getElementById('tracker-num').textContent = total + ' / 30';
  document.getElementById('prog').style.width = Math.min((total/30)*100,100) + '%';
  document.getElementById('tracker-sub').textContent = stages + ' stages/apprentissages · ' + jobs + " jobs d'été";
}

function renderList() {
  const sec = document.getElementById('history-section');
  const list = document.getElementById('sent-list');
  if (!sentItems.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = sentItems.map((item, i) => `
    <div class="sent-item">
      <div>
        <span style="font-size:13px;font-weight:600;">${item.company}</span>
        <span style="font-size:12px;color:#888;margin-left:6px;">${item.city||''}</span>
        <span class="badge badge-${item.type==='apprentissage'?'app':item.type}">${item.type}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;color:#aaa;">${item.date}</span>
        <button class="btn-danger" onclick="removeItem(${i})">✕</button>
      </div>
    </div>`).join('');
}

function removeItem(i) {
  sentItems.splice(i,1);
  try { localStorage.setItem('noah_cand', JSON.stringify(sentItems)); } catch(e) {}
  updateTracker(); renderList();
}

updateTracker(); renderList();
</script>
</body>
</html>
